<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brainstorm - Lizzy 2.0</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', 'Times New Roman', serif;
            background: #f5f1e8;
            min-height: 100vh;
            padding: 0;
            color: #2d2d2d;
        }

        .header {
            background: white;
            padding: 30px 40px;
            border-bottom: 3px solid #b83e3e;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 2em;
            color: #b83e3e;
            font-weight: 700;
        }

        .header a {
            color: #b83e3e;
            text-decoration: none;
            font-style: italic;
        }

        .header a:hover {
            opacity: 0.7;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px;
        }

        .intro-section {
            text-align: center;
            margin-bottom: 40px;
        }

        .intro-section h2 {
            font-size: 2.2em;
            color: #b83e3e;
            margin-bottom: 16px;
        }

        .intro-section p {
            font-size: 1.1em;
            color: #666;
            font-style: italic;
        }

        /* Batch Mode Styles */
        .batch-header {
            background: white;
            border-radius: 20px;
            border: 3px solid #b83e3e;
            padding: 32px;
            margin-bottom: 24px;
        }

        .batch-header h3 {
            font-size: 1.8em;
            color: #b83e3e;
            margin-bottom: 16px;
        }

        .progress-bar {
            background: #e8d5d5;
            height: 32px;
            border-radius: 16px;
            overflow: hidden;
            margin: 20px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #b83e3e, #d85858);
            transition: width 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
        }

        .batch-actions {
            display: flex;
            gap: 16px;
            margin-top: 20px;
        }

        .btn {
            padding: 14px 32px;
            border: 2px solid #b83e3e;
            background: white;
            color: #b83e3e;
            border-radius: 25px;
            font-family: 'Georgia', serif;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .btn:hover {
            background: #b83e3e;
            color: white;
        }

        .btn-primary {
            background: #b83e3e;
            color: white;
        }

        .btn-primary:hover {
            background: #9a3232;
        }

        .scenes-list {
            background: white;
            border-radius: 20px;
            border: 3px solid #b83e3e;
            overflow: hidden;
        }

        .scenes-table {
            width: 100%;
            border-collapse: collapse;
        }

        .scenes-table th {
            background: #b83e3e;
            color: white;
            padding: 16px 20px;
            text-align: left;
            font-weight: 600;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .scenes-table td {
            padding: 16px 20px;
            border-bottom: 1px solid #f0e8e8;
        }

        .scenes-table tbody tr:nth-child(even) {
            background: #fefbf8;
        }

        .scenes-table tbody tr:hover {
            background: #fef5f5;
        }

        .status-icon {
            font-size: 1.2em;
            margin-right: 8px;
        }

        .status-done { color: #48bb78; }
        .status-processing { color: #f59e0b; }
        .status-pending { color: #ccc; }

        .scene-title {
            font-weight: 600;
            color: #b83e3e;
        }

        /* Message Container */
        #message-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            max-width: 500px;
        }

        .message-alert {
            padding: 20px 28px;
            border-radius: 12px;
            font-size: 1em;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
            animation: slideIn 0.3s ease;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        @keyframes slideIn {
            from { transform: translateX(400px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .message-alert.success {
            background: #d4edda;
            border: 3px solid #48bb78;
            color: #155724;
        }

        .message-alert.error {
            background: #f8d7da;
            border: 3px solid #dc3545;
            color: #721c24;
        }

        /* Loading Spinner */
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f0e8e8;
            border-top-color: #b83e3e;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-message {
            display: none;
            padding: 20px;
            text-align: center;
            color: #666;
            font-style: italic;
        }

        .loading-message.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Brainstorm</h1>
        <a href="/">← Back to Home</a>
    </div>

    <div class="container">
        <div class="intro-section">
            <h2>Generate Scene Brainstorms</h2>
            <p>Query expert knowledge graphs or batch-process all 30 scenes</p>
        </div>

        <!-- Batch Mode -->
        <div id="batch-mode">
            <div class="batch-header">
                <h3>Batch Process All Scenes</h3>
                <p style="color: #666; font-style: italic; margin-bottom: 20px;">
                    Generate brainstorms for all 30 scenes using the 3 expert knowledge graphs
                </p>

                <div class="progress-bar">
                    <div class="progress-fill" id="batch-progress" style="width: 0%">0/30 scenes</div>
                </div>

                <div class="batch-actions">
                    <button class="btn btn-primary" onclick="startBatchProcess()">
                        Generate All Brainstorms
                    </button>
                    <button class="btn" onclick="loadBatchScenes()">
                        Refresh Status
                    </button>
                </div>
            </div>

            <div class="scenes-list">
                <table class="scenes-table">
                    <thead>
                        <tr>
                            <th style="width: 80px;">Status</th>
                            <th style="width: 60px;">#</th>
                            <th>Scene</th>
                            <th style="width: 200px;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="batch-scenes-list">
                        <tr>
                            <td colspan="4" style="text-align: center; padding: 40px; color: #999;">
                                Loading scenes...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Message Container -->
    <div id="message-container"></div>

    <script>
        let currentProject = null;

        // Initialize page
        async function init() {
            // Get current project from URL params or localStorage
            const urlParams = new URLSearchParams(window.location.search);
            const projectName = urlParams.get('project') || localStorage.getItem('currentProject');

            if (!projectName) {
                showMessage('No project selected. Please select a project from Setup.', 'error');
                setTimeout(() => window.location.href = '/setup', 2000);
                return;
            }

            currentProject = projectName;
            localStorage.setItem('currentProject', projectName);

            // Load batch scenes
            loadBatchScenes();
        }

        // ===== BATCH MODE =====

        async function loadBatchScenes() {
            const tbody = document.getElementById('batch-scenes-list');

            try {
                const response = await fetch(`/api/brainstorm/batch/status?project=${currentProject}`);
                const data = await response.json();

                if (!data.scenes || data.scenes.length === 0) {
                    tbody.innerHTML = `
                        <tr>
                            <td colspan="4" style="text-align: center; padding: 40px; color: #999;">
                                No scenes found. Please set up your project first.
                            </td>
                        </tr>
                    `;
                    return;
                }

                // Update progress bar
                const completed = data.scenes.filter(s => s.status === 'done').length;
                const total = data.scenes.length;
                const percentage = Math.round((completed / total) * 100);

                const progressFill = document.getElementById('batch-progress');
                progressFill.style.width = percentage + '%';
                progressFill.textContent = `${completed}/${total} scenes`;

                // Render scenes
                tbody.innerHTML = data.scenes.map(scene => {
                    const statusText = scene.status === 'done' ? 'Done' :
                                      scene.status === 'processing' ? 'Processing' : 'Pending';
                    const statusClass = scene.status === 'done' ? 'status-done' :
                                       scene.status === 'processing' ? 'status-processing' : 'status-pending';

                    return `
                        <tr>
                            <td>
                                <span class="status-icon ${statusClass}">${statusText}</span>
                            </td>
                            <td><strong>${scene.scene_number}</strong></td>
                            <td>
                                <div class="scene-title">${scene.title}</div>
                                <div style="font-size: 0.9em; color: #666; font-style: italic; margin-top: 4px;">
                                    ${scene.description ? scene.description.substring(0, 80) + '...' : 'No description'}
                                </div>
                            </td>
                            <td>
                                ${scene.status === 'done' ?
                                    `<button class="btn-small" onclick="viewBrainstorm(${scene.scene_number})">View Brainstorm</button>` :
                                    `<button class="btn-small" onclick="generateScene(${scene.scene_number})">Generate</button>`
                                }
                            </td>
                        </tr>
                    `;
                }).join('');

            } catch (error) {
                console.error('Error loading scenes:', error);
                tbody.innerHTML = `
                    <tr>
                        <td colspan="4" style="text-align: center; padding: 40px; color: #dc3545;">
                            Error loading scenes: ${error.message}
                        </td>
                    </tr>
                `;
            }
        }

        async function startBatchProcess() {
            if (!confirm('Generate brainstorms for all 30 scenes? This may take several minutes.')) {
                return;
            }

            showMessage('Starting batch process...', 'success');

            try {
                const response = await fetch('/api/brainstorm/batch/start', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ project: currentProject })
                });

                const data = await response.json();

                if (data.success) {
                    showMessage('Batch process started! Generating brainstorms...', 'success');
                    // Poll for updates
                    pollBatchProgress();
                } else {
                    showMessage(data.error || 'Failed to start batch process', 'error');
                }
            } catch (error) {
                showMessage('Error: ' + error.message, 'error');
            }
        }

        function pollBatchProgress() {
            const interval = setInterval(async () => {
                await loadBatchScenes();

                // Check if complete
                const progressFill = document.getElementById('batch-progress');
                if (progressFill.textContent.startsWith('30/30')) {
                    clearInterval(interval);
                    showMessage('All scenes completed!', 'success');
                }
            }, 3000);
        }

        async function generateScene(sceneNumber) {
            // Redirect to generation page with live progress
            window.location.href = `/brainstorm/generate?project=${currentProject}&scene=${sceneNumber}`;
        }

        function viewBrainstorm(sceneNumber) {
            // Navigate to manager page brainstorms tab
            window.location.href = `/manager?project=${currentProject}#brainstorms`;
        }

        // ===== UTILITY FUNCTIONS =====

        function showMessage(text, type) {
            const container = document.getElementById('message-container');
            container.innerHTML = `<div class="message-alert ${type}">${escapeHtml(text)}</div>`;

            if (type === 'success') {
                setTimeout(() => {
                    container.innerHTML = '';
                }, 4000);
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function saveToScene(messageId) {
            alert('Save to scene - Feature coming soon!');
        }

        function copyResponse(messageId) {
            alert('Copy response - Feature coming soon!');
        }

        // Initialize on load
        init();
    </script>
</body>
</html>
