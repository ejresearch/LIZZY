<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brainstorm - Lizzy 2.0</title>
    <link rel="stylesheet" href="styles/common.css">
    <style>
        .intro-section {
            text-align: center;
            margin-bottom: var(--spacing-lg);
        }

        .intro-section h2 {
            font-size: 2.2em;
            color: var(--color-primary);
            margin-bottom: var(--spacing-sm);
        }

        .intro-section p {
            font-size: 1.1em;
            color: var(--color-text-light);
            font-style: italic;
        }

        /* Batch Mode Styles */
        .batch-header {
            background: var(--color-white);
            border-radius: var(--radius-md);
            border: 3px solid var(--color-primary);
            padding: var(--spacing-lg);
            margin-bottom: var(--spacing-md);
        }

        .batch-header h3 {
            font-size: 1.8em;
            color: var(--color-primary);
            margin-bottom: var(--spacing-sm);
        }

        .progress-bar {
            background: #e8d5d5;
            height: 32px;
            border-radius: 16px;
            overflow: hidden;
            margin: var(--spacing-sm) 0;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--color-primary), #d85858);
            transition: width 0.5s ease;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .progress-bar::after {
            content: attr(data-progress);
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--color-text);
            font-weight: 600;
            z-index: 2;
            pointer-events: none;
        }

        .batch-actions {
            display: flex;
            gap: var(--spacing-sm);
            margin-top: var(--spacing-sm);
        }

        .scenes-list {
            background: var(--color-white);
            border-radius: var(--radius-md);
            border: 3px solid var(--color-primary);
            overflow: hidden;
        }

        .scenes-table {
            width: 100%;
            border-collapse: collapse;
        }

        .scenes-table th {
            background: var(--color-primary);
            color: var(--color-white);
            padding: var(--spacing-sm) var(--spacing-sm);
            text-align: left;
            font-weight: 600;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .scenes-table td {
            padding: var(--spacing-sm) var(--spacing-sm);
            border-bottom: 1px solid #f0e8e8;
        }

        .scenes-table tbody tr:nth-child(even) {
            background: #fefbf8;
        }

        .scenes-table tbody tr:hover {
            background: var(--color-primary-light);
        }

        .status-icon {
            font-size: 1.2em;
            margin-right: var(--spacing-xs);
        }

        .status-done { color: #48bb78; }
        .status-processing { color: #f59e0b; }
        .status-pending { color: #ccc; }

        .scene-title {
            font-weight: 600;
            color: var(--color-primary);
        }

        /* Message Container */
        #message-container {
            position: fixed;
            top: var(--spacing-sm);
            right: var(--spacing-sm);
            z-index: 1000;
            max-width: 500px;
        }

        @keyframes slideIn {
            from { transform: translateX(400px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Loading Spinner */
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f0e8e8;
            border-top-color: var(--color-primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-message {
            display: none;
            padding: var(--spacing-sm);
            text-align: center;
            color: var(--color-text-light);
            font-style: italic;
        }

        .loading-message.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="header-simple">
        <h1>Brainstorm</h1>
        <a href="/" class="link-italic">← Back to Home</a>
    </div>

    <div class="container">
        <div class="intro-section">
            <h2>Generate Scene Brainstorms</h2>
            <p>Query expert knowledge graphs or batch-process all 30 scenes</p>
        </div>

        <!-- Batch Mode -->
        <div id="batch-mode">
            <div class="batch-header">
                <h3>Batch Process All Scenes</h3>
                <p style="color: #666; font-style: italic; margin-bottom: 20px;">
                    Generate brainstorms for all 30 scenes using the 3 expert knowledge graphs
                </p>

                <div class="progress-bar" id="progress-bar-container" data-progress="0/30 scenes">
                    <div class="progress-fill" id="batch-progress" style="width: 0%"></div>
                </div>

                <div class="batch-actions">
                    <button class="btn btn-primary" onclick="startBatchProcess()">
                        Generate All Brainstorms
                    </button>
                    <button class="btn" onclick="loadBatchScenes()">
                        Refresh Status
                    </button>
                </div>
            </div>

            <div class="scenes-list">
                <table class="scenes-table">
                    <thead>
                        <tr>
                            <th style="width: 80px;">Status</th>
                            <th style="width: 60px;">#</th>
                            <th>Scene</th>
                            <th style="width: 200px;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="batch-scenes-list">
                        <tr>
                            <td colspan="4" style="text-align: center; padding: 40px; color: #999;">
                                Loading scenes...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Message Container -->
    <div id="message-container"></div>

    <script>
        let currentProject = null;

        // Initialize page
        async function init() {
            // Get current project from URL params or localStorage
            const urlParams = new URLSearchParams(window.location.search);
            const projectName = urlParams.get('project') || localStorage.getItem('currentProject');

            if (!projectName) {
                showMessage('No project selected. Please select a project from Setup.', 'error');
                setTimeout(() => window.location.href = '/setup', 2000);
                return;
            }

            currentProject = projectName;
            localStorage.setItem('currentProject', projectName);

            // Load batch scenes
            loadBatchScenes();
        }

        // ===== BATCH MODE =====

        async function loadBatchScenes() {
            const tbody = document.getElementById('batch-scenes-list');

            try {
                const response = await fetch(`/api/brainstorm/batch/status?project=${currentProject}`);
                const data = await response.json();

                if (!data.scenes || data.scenes.length === 0) {
                    tbody.innerHTML = `
                        <tr>
                            <td colspan="4" style="text-align: center; padding: 40px; color: #999;">
                                No scenes found. Please set up your project first.
                            </td>
                        </tr>
                    `;
                    return;
                }

                // Update progress bar
                const completed = data.scenes.filter(s => s.status === 'done').length;
                const total = data.scenes.length;
                const percentage = Math.round((completed / total) * 100);

                const progressFill = document.getElementById('batch-progress');
                const progressContainer = document.getElementById('progress-bar-container');
                progressFill.style.width = percentage + '%';
                progressContainer.setAttribute('data-progress', `${completed}/${total} scenes`);

                // Render scenes
                tbody.innerHTML = data.scenes.map(scene => {
                    const statusText = scene.status === 'done' ? 'Done' :
                                      scene.status === 'processing' ? 'Processing' : 'Pending';
                    const statusClass = scene.status === 'done' ? 'status-done' :
                                       scene.status === 'processing' ? 'status-processing' : 'status-pending';

                    return `
                        <tr>
                            <td>
                                <span class="status-icon ${statusClass}">${statusText}</span>
                            </td>
                            <td><strong>${scene.scene_number}</strong></td>
                            <td>
                                <div class="scene-title">${scene.title}</div>
                                <div style="font-size: 0.9em; color: #666; font-style: italic; margin-top: 4px;">
                                    ${scene.description ? scene.description.substring(0, 80) + '...' : 'No description'}
                                </div>
                            </td>
                            <td>
                                ${scene.status === 'done' ?
                                    `<button class="btn-small" onclick="viewBrainstorm(${scene.scene_number})">View Brainstorm</button>` :
                                    `<button class="btn-small" onclick="generateScene(${scene.scene_number})">Generate</button>`
                                }
                            </td>
                        </tr>
                    `;
                }).join('');

            } catch (error) {
                console.error('Error loading scenes:', error);
                tbody.innerHTML = `
                    <tr>
                        <td colspan="4" style="text-align: center; padding: 40px; color: #dc3545;">
                            Error loading scenes: ${error.message}
                        </td>
                    </tr>
                `;
            }
        }

        async function startBatchProcess() {
            if (!confirm('Generate brainstorms for all 30 scenes? This may take several minutes.')) {
                return;
            }

            showMessage('Starting batch process...', 'success');

            try {
                const response = await fetch('/api/brainstorm/batch/start', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ project: currentProject })
                });

                const data = await response.json();

                if (data.success) {
                    showMessage('Batch process started! Generating brainstorms...', 'success');
                    // Poll for updates
                    pollBatchProgress();
                } else {
                    showMessage(data.error || 'Failed to start batch process', 'error');
                }
            } catch (error) {
                showMessage('Error: ' + error.message, 'error');
            }
        }

        function pollBatchProgress() {
            const interval = setInterval(async () => {
                await loadBatchScenes();

                // Check if complete
                const progressFill = document.getElementById('batch-progress');
                if (progressFill.textContent.startsWith('30/30')) {
                    clearInterval(interval);
                    showMessage('All scenes completed!', 'success');
                }
            }, 3000);
        }

        async function generateScene(sceneNumber) {
            // Redirect to generation page with live progress
            window.location.href = `/brainstorm/generate?project=${currentProject}&scene=${sceneNumber}`;
        }

        function viewBrainstorm(sceneNumber) {
            // Navigate to manager page brainstorms tab
            window.location.href = `/manager?project=${currentProject}#brainstorms`;
        }

        // ===== UTILITY FUNCTIONS =====

        function showMessage(text, type) {
            const container = document.getElementById('message-container');
            container.innerHTML = `<div class="message-alert ${type}">${escapeHtml(text)}</div>`;

            if (type === 'success') {
                setTimeout(() => {
                    container.innerHTML = '';
                }, 4000);
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function saveToScene(messageId) {
            alert('Save to scene - Feature coming soon!');
        }

        function copyResponse(messageId) {
            alert('Copy response - Feature coming soon!');
        }

        // Initialize on load
        init();
    </script>
</body>
</html>
