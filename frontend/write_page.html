<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Write - Lizzy 2.0</title>
    <link rel="stylesheet" href="styles/common.css">
    <style>
        .intro-section {
            text-align: center;
            margin-bottom: var(--spacing-lg);
        }

        .intro-section h2 {
            font-size: 2.2em;
            color: var(--color-primary);
            margin-bottom: var(--spacing-sm);
        }

        .intro-section p {
            font-size: 1.1em;
            color: var(--color-text-light);
            font-style: italic;
        }

        /* Batch Mode Styles */
        .batch-header {
            background: var(--color-white);
            border-radius: var(--radius-md);
            border: 3px solid var(--color-primary);
            padding: var(--spacing-lg);
            margin-bottom: var(--spacing-md);
        }

        .batch-header h3 {
            font-size: 1.8em;
            color: var(--color-primary);
            margin-bottom: var(--spacing-sm);
        }

        .progress-bar {
            background: #e8d5d5;
            height: 32px;
            border-radius: 16px;
            overflow: hidden;
            margin: var(--spacing-sm) 0;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--color-primary), #d85858);
            transition: width 0.5s ease;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .progress-bar::after {
            content: attr(data-progress);
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--color-text);
            font-weight: 600;
            z-index: 2;
            pointer-events: none;
        }

        .batch-actions {
            display: flex;
            gap: var(--spacing-sm);
            margin-top: var(--spacing-sm);
        }

        .scenes-list {
            background: var(--color-white);
            border-radius: var(--radius-md);
            border: 3px solid var(--color-primary);
            overflow: hidden;
        }

        .scenes-table {
            width: 100%;
            border-collapse: collapse;
        }

        .scenes-table th {
            background: var(--color-primary);
            color: var(--color-white);
            padding: var(--spacing-sm) var(--spacing-sm);
            text-align: left;
            font-weight: 600;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .scenes-table td {
            padding: var(--spacing-sm) var(--spacing-sm);
            border-bottom: 1px solid #f0e8e8;
        }

        .scenes-table tbody tr:nth-child(even) {
            background: #fefbf8;
        }

        .scenes-table tbody tr:hover {
            background: var(--color-primary-light);
        }


        .scene-title {
            font-weight: 600;
            color: var(--color-primary);
        }

        /* Generation Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 10000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--color-white);
            border-radius: var(--radius-md);
            padding: var(--spacing-lg);
            max-width: 900px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            border: 3px solid var(--color-primary);
        }

        .modal-header {
            text-align: center;
            margin-bottom: var(--spacing-md);
        }

        .modal-header h2 {
            color: var(--color-primary);
            font-size: 2em;
            margin-bottom: var(--spacing-xs);
        }

        .modal-header p {
            color: var(--color-text-light);
            font-style: italic;
        }

        .progress-bar {
            background: #f0f0f0;
            height: 10px;
            border-radius: 5px;
            overflow: hidden;
            margin: var(--spacing-sm) 0;
        }

        .progress-fill {
            background: linear-gradient(90deg, var(--color-primary), #d45d5d);
            height: 100%;
            width: 0%;
            transition: width var(--transition-normal);
        }

        .progress-text {
            text-align: center;
            color: #999;
            font-size: 14px;
            margin-top: 10px;
        }

        .draft-preview {
            background: #f9f9f9;
            border-radius: var(--radius-sm);
            padding: var(--spacing-md);
            margin: var(--spacing-md) 0;
        }

        .draft-preview h4 {
            color: var(--color-primary);
            margin-bottom: var(--spacing-sm);
        }

        .draft-meta {
            display: flex;
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-sm);
            font-size: 14px;
            color: var(--color-text-light);
        }

        .draft-content {
            background: var(--color-white);
            padding: var(--spacing-sm);
            border-radius: var(--radius-sm);
            font-family: 'Courier New', monospace;
            font-size: 12px;
            line-height: 1.5;
            max-height: 500px;
            overflow-y: auto;
            white-space: pre-wrap;
        }

        .modal-footer {
            text-align: center;
            margin-top: var(--spacing-md);
        }

        /* Message Container */
        #message-container {
            position: fixed;
            top: var(--spacing-sm);
            right: var(--spacing-sm);
            z-index: 1000;
            max-width: 500px;
        }

        @keyframes slideIn {
            from { transform: translateX(400px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="header-simple">
        <h1>Write Scenes</h1>
        <a href="/" class="link-italic">← Back to Home</a>
    </div>

    <div class="container">
        <div class="intro-section">
            <h2>Generate Scene Drafts</h2>
            <p>Transform brainstormed blueprints into professionally formatted screenplay scenes</p>
        </div>

        <!-- Batch Mode -->
        <div id="batch-mode">
            <div class="batch-header">
                <h3>Batch Process All Scenes</h3>
                <p style="color: var(--color-text-light); font-style: italic; margin-bottom: var(--spacing-sm);">
                    Generate screenplay drafts for all 30 scenes at once
                </p>

                <div class="progress-bar" id="progress-bar-container" data-progress="0/30 scenes">
                    <div class="progress-fill" id="batch-progress" style="width: 0%"></div>
                </div>

                <div class="batch-actions">
                    <button class="btn btn-primary" onclick="startBatchWrite()">
                        Generate All Drafts
                    </button>
                    <button class="btn" onclick="loadScenes()">
                        Refresh Status
                    </button>
                </div>
            </div>
        </div>

        <div class="scenes-list">
            <table class="scenes-table">
                <thead>
                    <tr>
                        <th style="width: 120px;">Status</th>
                        <th style="width: 60px;">#</th>
                        <th>Scene</th>
                        <th style="width: 150px;">Drafts</th>
                        <th style="width: 180px;">Actions</th>
                    </tr>
                </thead>
                <tbody id="scenes-list">
                    <tr>
                        <td colspan="5" style="text-align: center; padding: 40px; color: #999;">
                            Loading scenes...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Message Container -->
    <div id="message-container"></div>

    <script>
        let currentProject = null;

        // Initialize page
        async function init() {
            const urlParams = new URLSearchParams(window.location.search);
            const projectName = urlParams.get('project') || localStorage.getItem('currentProject');

            if (!projectName) {
                showMessage('No project selected. Redirecting to home...', 'error');
                setTimeout(() => window.location.href = '/', 2000);
                return;
            }

            currentProject = projectName;
            localStorage.setItem('currentProject', projectName);

            loadScenes();
        }

        async function loadScenes() {
            const tbody = document.getElementById('scenes-list');

            try {
                // Load scenes from batch status (same as Brainstorm page)
                const batchResponse = await fetch(`/api/brainstorm/batch/status?project=${currentProject}`);
                const batchData = await batchResponse.json();

                console.log('Batch data:', batchData);

                if (!batchData.scenes || batchData.scenes.length === 0) {
                    tbody.innerHTML = `
                        <tr>
                            <td colspan="5" style="text-align: center; padding: 40px; color: #999;">
                                No scenes found. Please create scenes in Manager first.
                            </td>
                        </tr>
                    `;
                    return;
                }

                const scenes = batchData.scenes;

                // Load brainstorm status
                const brainstormResponse = await fetch(`/api/brainstorm/brainstorms/${currentProject}`);
                const brainstormData = await brainstormResponse.json();
                console.log('Brainstorm data:', brainstormData);

                const brainstormsMap = {};
                if (brainstormData.brainstorms && Array.isArray(brainstormData.brainstorms)) {
                    brainstormData.brainstorms.forEach(bs => {
                        brainstormsMap[bs.scene_number] = bs.brainstorm ? true : false;
                    });
                }

                // Load draft status
                const draftsResponse = await fetch(`/api/write/drafts/${currentProject}`);
                const draftsData = await draftsResponse.json();
                console.log('Drafts data:', draftsData);

                const draftsMap = {};
                if (draftsData.drafts && Array.isArray(draftsData.drafts)) {
                    draftsData.drafts.forEach(draft => {
                        if (!draftsMap[draft.scene_number]) {
                            draftsMap[draft.scene_number] = 0;
                        }
                        draftsMap[draft.scene_number]++;
                    });
                }

                // Update progress bar
                const completed = Object.keys(draftsMap).length;
                const total = scenes.length;
                const percentage = Math.round((completed / total) * 100);

                const progressFill = document.getElementById('batch-progress');
                const progressContainer = document.getElementById('progress-bar-container');
                progressFill.style.width = percentage + '%';
                progressContainer.setAttribute('data-progress', `${completed}/${total} scenes`);

                // Render scenes
                tbody.innerHTML = scenes.map(scene => {
                    const hasBrainstorm = brainstormsMap[scene.scene_number];
                    const draftCount = draftsMap[scene.scene_number] || 0;
                    const canGenerate = hasBrainstorm;

                    let statusBadge = '';
                    if (hasBrainstorm) {
                        statusBadge = '<span class="status status-success">✓ Ready</span>';
                    } else {
                        statusBadge = '<span class="status status-pending">⚠ No Brainstorm</span>';
                    }

                    return `
                        <tr>
                            <td>
                                ${statusBadge}
                            </td>
                            <td><strong>${scene.scene_number}</strong></td>
                            <td>
                                <div class="scene-title">${scene.title || 'Untitled'}</div>
                                <div style="font-size: 0.9em; color: #666; font-style: italic; margin-top: 4px;">
                                    ${scene.description ? scene.description.substring(0, 100) + '...' : 'No description'}
                                </div>
                            </td>
                            <td>
                                ${draftCount > 0 ? `<strong>${draftCount} version${draftCount > 1 ? 's' : ''}</strong>` : 'None yet'}
                            </td>
                            <td>
                                <button
                                    class="btn-small ${canGenerate ? '' : ''}"
                                    onclick="navigateToGenerate(${scene.scene_number})"
                                    ${!canGenerate ? 'disabled' : ''}>
                                    ${draftCount > 0 ? 'New Version' : 'Generate'}
                                </button>
                            </td>
                        </tr>
                    `;
                }).join('');

            } catch (error) {
                console.error('Error loading scenes:', error);
                tbody.innerHTML = `
                    <tr>
                        <td colspan="5" style="text-align: center; padding: 40px; color: #dc3545;">
                            Error loading scenes: ${error.message}
                        </td>
                    </tr>
                `;
            }
        }

        async function startBatchWrite() {
            if (!confirm('Generate drafts for all scenes with brainstorms? This may take several minutes and will cost ~$0.30.')) {
                return;
            }

            showMessage('Batch write feature coming soon! For now, generate scenes individually.', 'info');
            // TODO: Implement batch write endpoint
        }

        function navigateToGenerate(sceneNumber) {
            // Navigate to dedicated generation page (like Brainstorm does)
            window.location.href = `/write/generate?project=${encodeURIComponent(currentProject)}&scene=${sceneNumber}`;
        }

        function showMessage(text, type) {
            const container = document.getElementById('message-container');
            container.innerHTML = `<div class="message-alert ${type}">${escapeHtml(text)}</div>`;

            if (type === 'success') {
                setTimeout(() => {
                    container.innerHTML = '';
                }, 4000);
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Initialize on load
        init();
    </script>
</body>
</html>
